  <style>
    :root {
      --bg:        hsl(0,0%,10%);
      --hero-bg:   hsl(0,0%,8%);
      --fg:        hsl(0,0%,96%);
      --primary:   hsl(119,99%,46%);
      --primary-fg:hsl(0,0%,4%);
      --secondary: hsl(0,0%,18%);
      --muted:     hsl(0,0%,16%);
      --muted-fg:  hsl(0,0%,60%);
      --border:    hsl(0,0%,20%);
      --nav-btn:   hsl(0,0%,18%);
      --radius:    0.5rem;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: "Sora", sans-serif;
      background: var(--bg); color: var(--fg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      max-width: 100%;
    }
    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 4rem;
      background: hsla(0,0%,8%,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    @media (max-width: 768px) { nav { padding: 1rem 1.5rem; } }
    .nav-logo { font-size: 1rem; font-weight: 700; letter-spacing: -0.03em; }
    .nav-logo span { color: var(--primary); }
    .nav-back {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted-fg);
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--fg); }

    /* HERO */
    .profile-hero {
      min-height: 100vh;
      background: var(--hero-bg);
      display: flex; align-items: flex-end;
      position: relative; overflow: hidden;
      padding-top: 80px;
    }
    .profile-hero::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        linear-gradient(hsl(0,0%,20%,0.3) 1px, transparent 1px),
        linear-gradient(90deg, hsl(0,0%,20%,0.3) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 40%, transparent 100%);
    }
    .profile-hero::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 30%, hsl(119,99%,46%,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .profile-hero-inner {
      position: relative; z-index: 2;
      width: 100%; max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 4rem 5rem;
      display: grid; grid-template-columns: auto 1fr;
      gap: 4rem; align-items: end;
    }
    @media (max-width: 768px) {
      .profile-hero-inner { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1.5rem 3rem; }
    }
    .profile-photo-frame {
      width: 200px; height: 200px; border-radius: 50%;
      overflow: hidden;
      border: 3px solid hsl(119,99%,46%,0.45);
      box-shadow: 0 0 0 6px hsl(119,99%,46%,0.07), 0 24px 64px rgba(0,0,0,0.5);
      background: var(--muted); flex-shrink: 0;
    }
    .profile-photo-frame img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top; display: block;
    }
    .profile-photo-frame .profile-initials {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; font-weight: 700; color: var(--primary);
    }
    .profile-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem;
    }
    .profile-name {
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 700; letter-spacing: -0.04em; line-height: 1.08;
      color: var(--fg); margin-bottom: 0.75rem;
    }
    .profile-role-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: hsl(119,99%,46%,0.1);
      border: 1px solid hsl(119,99%,46%,0.25);
      border-radius: 999px; padding: 0.4rem 1rem;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 1.5rem;
    }
    .profile-role-badge::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary); flex-shrink: 0;
    }
    .profile-intro {
      font-size: clamp(0.9rem, 1.5vw, 1.1rem); font-weight: 300;
      color: var(--muted-fg); line-height: 1.75; max-width: 60ch;
    }

    /* CONTENT */
    .profile-content {
      max-width: 1200px; margin: 0 auto;
      padding: 5rem 4rem;
      display: grid; grid-template-columns: 1fr 340px;
      gap: 4rem; align-items: start;
    }
    @media (max-width: 960px) {
      .profile-content { grid-template-columns: 1fr; gap: 3rem; padding: 3rem 1.5rem; }
    }
    .bio-section { border-top: 1px solid var(--border); padding-top: 2.5rem; }
    .bio-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 1rem;
    }
    .bio-paragraph {
      font-size: 1rem; font-weight: 300;
      color: var(--muted-fg); line-height: 1.85; margin-bottom: 1.25rem;
    }
    .bio-paragraph:last-child { margin-bottom: 0; }
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
    .sidebar-card {
      background: var(--secondary); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
    }
    .sidebar-card-label {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 1rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .credential-item {
      font-size: 0.8rem; font-weight: 300; color: var(--muted-fg); line-height: 1.5;
      display: flex; gap: 0.5rem; margin-bottom: 0.65rem;
    }
    .credential-item:last-child { margin-bottom: 0; }
    .credential-dash { color: var(--primary); flex-shrink: 0; }

    /* BACK */
    .back-section {
      background: var(--hero-bg); border-top: 1px solid var(--border);
      padding: 3rem 4rem; text-align: center;
    }
    @media (max-width: 768px) { .back-section { padding: 2rem 1.5rem; } }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--secondary); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1.5rem;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--fg);
      transition: border-color 0.2s, background 0.2s;
      margin: 0.4rem;
    }
    .back-btn:hover { border-color: hsl(119,99%,46%,0.4); background: var(--muted); }
    .team-nav { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }

    /* FOOTER */
    footer {
      background: var(--hero-bg); border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    @media (max-width: 768px) { footer { padding: 1.5rem; } }
    .footer-logo { font-size: 0.9rem; font-weight: 700; }
    .footer-logo span { color: var(--primary); }
    .footer-copy { font-size: 0.7rem; color: var(--muted-fg); font-weight: 300; }
    .footer-links { display: flex; gap: 1.5rem; list-style: none; flex-wrap: wrap; }
    .footer-links a { font-size: 0.7rem; font-weight: 400; color: var(--muted-fg); transition: color 0.2s; }
    .footer-links a:hover { color: var(--fg); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-1 { opacity:0; animation: fade-up 0.65s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }
    .fade-2 { opacity:0; animation: fade-up 0.65s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; }
    .fade-3 { opacity:0; animation: fade-up 0.65s cubic-bezier(0.16,1,0.3,1) 0.4s forwards; }

function el(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function renderPerson(person, allMembers) {
  var id = person.slug || person.id;

  document.title = person.name + ' — Instituto Português de Criminologia';

  /* hero photo */
  var frame = document.getElementById('heroPhotoFrame');
  if (person.photo) {
    var img = document.createElement('img');
    img.src = person.photo;
    img.alt = person.name;
    frame.appendChild(img);
  } else {
    var div = el('div', 'profile-initials');
    div.textContent = person.initials || '';
    frame.appendChild(div);
  }

  /* hero text */
  document.getElementById('heroLabel').textContent = 'Equipa IPC';
  document.getElementById('heroName').textContent  = person.name;
  document.getElementById('heroRole').textContent  = person.role;
  document.getElementById('heroIntro').textContent = person.intro || '';

  /* bio paragraphs */
  var bioEl = document.getElementById('bioText');
  (person.bio || []).forEach(function(text) {
    var p = el('p', 'bio-paragraph');
    p.textContent = text;
    bioEl.appendChild(p);
  });

  /* sidebar credentials */
  var sidebarEl = document.getElementById('sidebar');
  (person.credentials || []).forEach(function(group) {
    var card = el('div', 'sidebar-card');
    var lbl  = el('div', 'sidebar-card-label');
    lbl.textContent = group.label;
    card.appendChild(lbl);
    (group.items || []).forEach(function(item) {
      var row  = el('div', 'credential-item');
      var dash = el('span', 'credential-dash');
      dash.textContent = '—';
      var txt = el('span');
      txt.textContent = item;
      row.appendChild(dash);
      row.appendChild(txt);
      card.appendChild(row);
    });
    sidebarEl.appendChild(card);
  });

  /* prev / next navigation */
  var all   = allMembers || [];
  var idx   = all.findIndex(function(p) { return (p.slug || p.id) === id; });
  var prev  = all[idx - 1];
  var next  = all[idx + 1];
  var navEl = document.getElementById('teamNav');
  if (prev) {
    var a = el('a', 'back-btn');
    a.href = 'membro.html?id=' + (prev.slug || prev.id);
    a.textContent = '← ' + prev.name;
    navEl.appendChild(a);
  }
  if (next) {
    var b = el('a', 'back-btn');
    b.href = 'membro.html?id=' + (next.slug || next.id);
    b.textContent = next.name + ' →';
    navEl.appendChild(b);
  }
}

/* ── MAIN: try Sanity first, fall back to local TEAM array ── */
(function() {
  var params = new URLSearchParams(window.location.search);
  var id     = params.get('id') || '';

  var memberQuery = '*[_type=="membroEquipa"&&slug.current==' + JSON.stringify(id) + '][0]{'
    + 'nome,cargo,"slug":slug.current,fotoUrl,iniciais,intro,'
    + '"bio":bioLonga[]{...,children[]{...}},'
    + '"credentials":credenciais[]{label,items}'
    + '}';

  var allQuery = '*[_type=="membroEquipa"]|order(ordem asc){"slug":slug.current,nome}';

  Promise.all([groq(memberQuery), groq(allQuery)]).then(function(results) {
    var data    = results[0];
    var allMems = results[1] || [];

    if (data && data.nome) {
      /* Map Sanity Portable Text blocks to plain text paragraphs */
      var bioParagraphs = (data.bio || []).map(function(block) {
        return (block.children || []).map(function(span) { return span.text || ''; }).join('');
      }).filter(Boolean);

      renderPerson({
        slug:        data.slug,
        name:        data.nome,
        role:        data.cargo,
        photo:       data.fotoUrl || null,
        initials:    data.iniciais || '',
        intro:       data.intro || '',
        bio:         bioParagraphs,
        credentials: data.credentials || []
      }, allMems.map(function(m) { return {slug: m.slug, name: m.nome}; }));
    } else {
      /* Fallback to hardcoded TEAM data */
      var person = TEAM.find(function(p) { return p.id === id; });
      if (!person) {
        document.title = 'Perfil não encontrado — IPC';
        document.getElementById('heroName').textContent  = 'Perfil não encontrado';
        document.getElementById('heroIntro').textContent = 'O perfil solicitado não existe.';
        return;
      }
      renderPerson({
        slug: person.id, name: person.name, role: person.role,
        photo: person.photo, initials: person.initials || '',
        intro: person.intro, bio: person.bio,
        credentials: person.credentials
      }, TEAM.map(function(p) { return {slug: p.id, name: p.name}; }));
    }
  }).catch(function() {
    /* Network error — use hardcoded fallback */
    var person = TEAM.find(function(p) { return p.id === id; });
    if (!person) return;
    renderPerson({
      slug: person.id, name: person.name, role: person.role,
      photo: person.photo, initials: person.initials || '',
      intro: person.intro, bio: person.bio,
      credentials: person.credentials
    }, TEAM.map(function(p) { return {slug: p.id, name: p.name}; }));
  });
})();
